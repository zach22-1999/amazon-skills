<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>
    :root {
      --blue: #2563eb;
      --blue-light: #eff6ff;
      --green: #16a34a;
      --orange: #ea580c;
      --red: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--gray-700);
      background: var(--gray-50);
      line-height: 1.6;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }
    .header { text-align: center; margin-bottom: 48px; }
    .header h1 { margin: 0 0 8px; color: var(--gray-900); font-size: 28px; }
    .subtitle { color: var(--gray-500); font-size: 14px; }
    section { margin-bottom: 40px; }
    section h2 { font-size: 18px; color: var(--gray-900); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--gray-200); }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .kpi-card, .pain-card, .tier-card { background: white; border: 1px solid var(--gray-200); border-radius: 10px; }
    .kpi-card { padding: 16px; }
    .kpi-card .label { font-size: 12px; color: var(--gray-500); }
    .kpi-card .value { font-size: 24px; font-weight: 700; color: var(--gray-900); }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden; }
    th, td { padding: 10px 14px; border-top: 1px solid var(--gray-100); text-align: left; }
    th { background: var(--gray-100); }
    .pain-grid, .tier-grid { display: grid; gap: 12px; }
    .pain-grid { grid-template-columns: 1fr 1fr; }
    .tier-grid { grid-template-columns: repeat(3, 1fr); }
    .pain-card, .tier-card { padding: 14px 16px; }
    .footer { text-align: center; font-size: 12px; color: var(--gray-500); margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--gray-200); }
    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .pain-grid, .tier-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{title}}</h1>
      <div class="subtitle">{{subtitle}}</div>
    </div>

    <section>
      <h2>市场大盘</h2>
      <div class="kpi-grid">
        {{kpi_cards}}
      </div>
    </section>

    <section>
      <h2>多维分布</h2>
      {{dimension_table}}
    </section>

    <section>
      <h2>消费者痛点</h2>
      <div class="pain-grid">
        {{pain_cards}}
      </div>
    </section>

    <section>
      <h2>机会空白</h2>
      {{gap_table}}
    </section>

    <section>
      <h2>策略建议</h2>
      <div class="tier-grid">
        {{strategy_cards}}
      </div>
    </section>

    <div class="footer">
      数据来源：{{data_sources}} · 采集日期：{{collected_at}} · 完整报告：{{md_filename}} · 数据文件：{{xlsx_filename}}
    </div>
  </div>
</body>
</html>
